### Hero [ hero-image ]
hero:
  image: "assets/img/profile2.png"
  image_alt: "Hassan Alsheikh"
  title: "<b>Hassan</b> Alsheikh"
  before_title: "Salam, <b>my name is</b>"
  after_title: "<strong>Media Personality & a Public Speaker</strong>"
  description: "Born & raised in the UAE . Over 25 years of experience captivating audiences at all types of events, coupled with a deep understanding of technology.
"
  button1:
    label: "My Services"
    link: "#services-section"
  button2:
    label: "My Portfolio"
    link: "#works-section"
  bg_title: "Public Speaker"
  info:
    - num: "25 <strong>+</strong>"
      value: "Years of <strong>Experience</strong>"

    - num: "330"
      value: "Completed <strong>Projects</strong>"

